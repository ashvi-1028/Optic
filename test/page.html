<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Optic Test Page</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 24px; }
    .post { border: 1px solid #ddd; padding: 12px; margin-bottom: 12px; }
    .caption { margin-top: 8px; }
  </style>
</head>
<body>
  <h1>Optic Test Page</h1>
  <div class="post" id="post-1">
    <img src="https://example.com/starbucks-cup.jpg" alt="A cup from Starbucks" width="320" />
    <div class="caption">daily coffee time</div>
    <div class="comments">
      <div class="comment">can't believe you moved to NYC, miss you already</div>
      <div class="comment">nice nails!</div>
    </div>
  </div>
  <div class="post" id="post-2">
    <img src="https://example.com/park.jpg" alt="Photo at the park" width="320" />
    <div class="caption">sunny day</div>
    <div class="comments">
      <div class="comment">welcome to the neighborhood</div>
    </div>
  </div>
  <p>Open the extension popup and click the <strong>Test In-Page Banner</strong> button to inject a sample banner.</p>
</body>
</html>
